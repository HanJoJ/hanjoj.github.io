<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öffne App...</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; color: #333; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #0078D7; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #0078D7; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <h2>Das Update wird an die App übergeben...</h2>
    <p>Falls sich die App nicht automatisch öffnet, klicken Sie <a id="manualLink" href="#">hier</a>.</p>

    <script>
        // 1. Die URL-Parameter (alles nach dem ? in der URL auslesen)
        var params = window.location.search; 

        // 2. Den echten App-Link zusammenbauen
        var appLink = "ocubt://import" + params;

        // 3. Fallback: Den manuellen Link auf der Webseite anpassen
        document.getElementById("manualLink").href = appLink;

        // 4. Den Browser anweisen, die Windows-App sofort zu starten
        setTimeout(function() {
            window.location.href = appLink;
        }, 500); // 0.5 Sekunden Verzögerung, damit die UI kurz sichtbar ist
    </script>
</body>
</html>
